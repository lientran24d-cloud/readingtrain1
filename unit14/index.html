<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Shine Bright - Unit 14</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Quicksand for a kid-friendly rounded look -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Canvas Confetti for celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        bamboo: {
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                        },
                        sunny: {
                            100: '#fef3c7',
                            200: '#fde68a',
                            400: '#fbbf24',
                            500: '#f59e0b',
                            600: '#d97706',
                        },
                        assistant: {
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        magic: {
                            100: '#fae8ff',
                            500: '#d946ef',
                            600: '#c026d3',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f0fdf4;
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 40px 40px;
        }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .option-btn:active:not(:disabled) { transform: translateY(0); }
        @keyframes bounce-gentle {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
        .animate-bounce-gentle { animation: bounce-gentle 3s infinite; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-800 min-h-screen py-8 px-4 sm:px-6">

    <div class="max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="text-center mb-6 relative">
            <div class="inline-block bg-white px-8 py-4 rounded-full shadow-lg border-4 border-bamboo-400 mb-4 animate-bounce-gentle">
                <h1 class="text-3xl sm:text-5xl font-extrabold text-bamboo-600 flex items-center justify-center gap-3">
                    <span>✨</span> Story Shine Bright! <span>🌟</span>
                </h1>
            </div>
            
            <!-- Nhập Tên Học Sinh -->
            <div class="max-w-md mx-auto mt-4 bg-white p-2 rounded-2xl shadow-md border-2 border-sunny-400 flex items-center gap-2">
                <span class="text-2xl pl-3">🧑‍🎓</span>
                <input type="text" id="student-name" class="flex-1 p-2 font-bold text-lg text-slate-700 focus:outline-none bg-transparent" placeholder="Nhập tên của em vào đây nhé...">
            </div>
        </header>

        <!-- Lesson Navigation -->
        <div class="mb-8">
            <div class="bg-white rounded-2xl p-2 shadow-md border-2 border-bamboo-200">
                <div id="lesson-tabs" class="flex overflow-x-auto no-scrollbar gap-2 p-1">
                    <!-- Tabs generated by JS -->
                </div>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-[2fr_3fr] gap-8 items-start">
            
            <!-- Left Column: The Passage -->
            <div class="space-y-6 lg:sticky lg:top-8">
                <div class="bg-white rounded-3xl p-6 sm:p-8 shadow-xl border-4 border-bamboo-500">
                    <div class="flex items-center justify-between gap-3 mb-6 border-b-2 border-bamboo-100 pb-4">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">📖</span>
                            <h2 id="passage-title" class="text-2xl sm:text-3xl font-bold text-bamboo-700">Đang tải...</h2>
                        </div>
                    </div>
                    
                    <div id="passage-content" class="text-lg sm:text-xl leading-relaxed space-y-4 font-medium text-slate-700">
                        <!-- Nội dung đoạn văn -->
                    </div>

                    <!-- Illustration Box -->
                    <div class="mt-8 bg-bamboo-50 rounded-2xl p-6 text-center border-2 border-dashed border-bamboo-300">
                        <div id="passage-image-placeholder" class="text-6xl mb-3">🖼️</div>
                        <p id="passage-image-desc" class="text-sm font-bold text-bamboo-600">Hình minh hoạ</p>
                    </div>
                </div>
            </div>

            <!-- Right Column: Questions -->
            <div>
                <div class="bg-sunny-400 text-white rounded-t-3xl p-4 sm:p-6 shadow-md border-4 border-sunny-500 border-b-0 flex justify-between items-center relative z-50">
                    <h2 class="text-2xl font-bold flex items-center gap-2">
                        <span>✏️</span> Bài Tập
                    </h2>
                    <div id="score-container" class="bg-white text-sunny-600 font-bold px-4 py-2 rounded-full text-lg shadow-inner">
                        Đã làm: <span id="answered-display">0</span>/<span id="total-questions-display">0</span>
                    </div>
                </div>
                
                <div id="questions-container" class="bg-white border-4 border-sunny-500 rounded-b-3xl p-4 sm:p-6 shadow-lg space-y-6 min-h-[300px] relative z-40">
                    <!-- Questions will be injected here via JavaScript -->
                </div>
            </div>

        </div>
    </div>

    <!-- Celebration Modal -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl border-8 border-sunny-400 transform scale-95 transition-transform duration-300" id="modal-content">
            <div class="text-6xl mb-4" id="modal-emoji">🎉</div>
            <h2 class="text-3xl font-extrabold text-bamboo-600 mb-2" id="modal-title">Chúc mừng bạn!</h2>
            
            <div class="flex justify-center gap-4 mb-6 mt-4">
                <div class="bg-bamboo-50 border-2 border-bamboo-400 rounded-2xl p-4 w-1/2 shadow-sm">
                    <div class="text-2xl mb-1">✅</div>
                    <p class="text-sm text-bamboo-600 font-bold uppercase tracking-wider">Làm đúng</p>
                    <p class="text-4xl text-bamboo-700 font-extrabold mt-1" id="modal-correct-score">0</p>
                </div>
                <div class="bg-red-50 border-2 border-red-400 rounded-2xl p-4 w-1/2 shadow-sm">
                    <div class="text-2xl mb-1">❌</div>
                    <p class="text-sm text-red-600 font-bold uppercase tracking-wider">Làm sai</p>
                    <p class="text-4xl text-red-700 font-extrabold mt-1" id="modal-incorrect-score">0</p>
                </div>
            </div>

            <p class="text-lg text-slate-500 mb-8 font-medium" id="modal-message">
                Tuyệt vời quá! Kết quả của em đã được gửi cho cô giáo rồi nhé!
            </p>
            <button onclick="closeModal()" class="w-full bg-bamboo-500 hover:bg-bamboo-600 text-white font-bold py-4 px-8 rounded-full text-xl shadow-lg transition-colors duration-200">
                Xem lại bài làm 🔍
            </button>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU BÀI HỌC UNIT 14 ---
        const lessonPassageHTML = `
            <div class="mb-5">
                <audio controls class="w-full rounded-full shadow-sm border-2 border-bamboo-200 bg-bamboo-50">
                    <source src="Unit 14 Fishing.wav" type="audio/wav">
                    Trình duyệt của bạn không hỗ trợ phát âm thanh.
                </audio>
            </div>
            <p>Alice got a hook and a pole.</p>
            <p>"Now I can catch a fish," she said.</p>
            <p>She put the hook in the water and waited.</p>
            <p>A few minutes later, the pole jumped and she pulled out a fish.</p>
            <p>Alice looked at the fish. The fish looked sad, so Alice took the fish off the hook and put it back in the water.</p>
            <p>Then, Alice put her pole away and sat down.</p>
            <p>"I don't want to catch anything," she said. "Sitting is better than fishing."</p>
        `;

        const lessonsData = [
            {
                id: '14A',
                title: "Fishing (Từ Vựng)",
                emoji: "🎣👧",
                imageDesc: "Alice going fishing",
                wordBank: ["sad", "fishing", "minute", "pole", "catch", "waited", "hook", "water"],
                passage: lessonPassageHTML,
                questions: [
                    // A. Missing Letters
                    { id: '14a_m1', section: 'A. Missing Letters (Điền chữ cái còn thiếu)', type: 'input', question: "s _ d ➔ <b>___</b>", correctAnswer: "sad", explanation: "Từ hoàn chỉnh là 'sad' (buồn)." },
                    { id: '14a_m2', type: 'input', question: "f _ s h _ n g ➔ <b>___</b>", correctAnswer: "fishing", explanation: "Từ hoàn chỉnh là 'fishing' (câu cá)." },
                    { id: '14a_m3', type: 'input', question: "m _ n _ t e ➔ <b>___</b>", correctAnswer: "minute", explanation: "Từ hoàn chỉnh là 'minute' (phút)." },
                    { id: '14a_m4', type: 'input', question: "p _ l e ➔ <b>___</b>", correctAnswer: "pole", explanation: "Từ hoàn chỉnh là 'pole' (cần câu)." },
                    { id: '14a_m5', type: 'input', question: "c _ t c h ➔ <b>___</b>", correctAnswer: "catch", explanation: "Từ hoàn chỉnh là 'catch' (bắt/câu được)." },
                    { id: '14a_m6', type: 'input', question: "w _ i t _ _ ➔ <b>___</b>", correctAnswer: "waited", explanation: "Từ hoàn chỉnh là 'waited' (đã chờ đợi)." },
                    { id: '14a_m7', type: 'input', question: "h _ o k ➔ <b>___</b>", correctAnswer: "hook", explanation: "Từ hoàn chỉnh là 'hook' (lưỡi câu)." },
                    { id: '14a_m8', type: 'input', question: "w _ t e r ➔ <b>___</b>", correctAnswer: "water", explanation: "Từ hoàn chỉnh là 'water' (nước)." },
                    
                    // B. Word Scramble
                    { id: '14a_w1', section: 'B. Word Scramble (Sắp xếp chữ cái tạo thành từ)', type: 'input', question: "d - a - s ➔ <b>___</b>", correctAnswer: "sad", explanation: "Sắp xếp lại thành 'sad'." },
                    { id: '14a_w2', type: 'input', question: "i - h - f - s - g - n - i ➔ <b>___</b>", correctAnswer: "fishing", explanation: "Sắp xếp lại thành 'fishing'." },
                    { id: '14a_w3', type: 'input', question: "u - t - m - n - e - i ➔ <b>___</b>", correctAnswer: "minute", explanation: "Sắp xếp lại thành 'minute'." },
                    { id: '14a_w4', type: 'input', question: "e - l - o - p ➔ <b>___</b>", correctAnswer: "pole", explanation: "Sắp xếp lại thành 'pole'." },
                    { id: '14a_w5', type: 'input', question: "t - c - h - c - a ➔ <b>___</b>", correctAnswer: "catch", explanation: "Sắp xếp lại thành 'catch'." },
                    { id: '14a_w6', type: 'input', question: "t - e - i - a - w ➔ <b>___</b>", correctAnswer: "wait", explanation: "Sắp xếp lại thành 'wait'." },
                    { id: '14a_w7', type: 'input', question: "o - k - h - o ➔ <b>___</b>", correctAnswer: "hook", explanation: "Sắp xếp lại thành 'hook'." },
                    { id: '14a_w8', type: 'input', question: "e - t - r - a - w ➔ <b>___</b>", correctAnswer: "water", explanation: "Sắp xếp lại thành 'water'." },

                    // C. Fill in the blanks
                    { id: '14a_f1', section: 'C. Fill in the blanks (Điền từ vào chỗ trống)', useWordBank: true, type: 'input', question: "Alice got a <b>___</b> and a hook.", correctAnswer: "pole", explanation: "Từ cần điền là 'pole' (cần câu)." },
                    { id: '14a_f2', type: 'input', question: "She put the hook into the <b>___</b>.", correctAnswer: "water", explanation: "Từ cần điền là 'water' (nước)." },
                    { id: '14a_f3', type: 'input', question: "She <b>___</b> for a few minutes.", correctAnswer: "waited", explanation: "Từ cần điền là 'waited' (đã đợi)." },
                    { id: '14a_f4', type: 'input', question: "Alice wanted to <b>___</b> a fish.", correctAnswer: "catch", explanation: "Từ cần điền là 'catch' (bắt/câu)." },
                    { id: '14a_f5', type: 'input', question: "There are 60 seconds in one <b>___</b>.", correctAnswer: "minute", explanation: "Từ cần điền là 'minute' (phút)." },
                    { id: '14a_f6', type: 'input', question: "The fish looked <b>___</b>.", correctAnswer: "sad", explanation: "Từ cần điền là 'sad' (buồn)." },
                    { id: '14a_f7', type: 'input', question: "They went <b>___</b> at the lake.", correctAnswer: "fishing", explanation: "Từ cần điền là 'fishing' (câu cá)." },
                    { id: '14a_f8', type: 'input', question: "Put the <b>___</b> on the fishing line before you start.", correctAnswer: "hook", explanation: "Từ cần điền là 'hook' (lưỡi câu)." }
                ]
            },
            {
                id: '14B',
                title: "Fishing (Đọc Hiểu)",
                emoji: "🎣👧",
                imageDesc: "Alice going fishing",
                wordBank: ["hook", "pole", "waited", "fish", "sad", "back", "away", "sitting"],
                passage: lessonPassageHTML,
                questions: [
                    // I. True or False
                    { id: '14b_tf1', section: 'I. Check Your Understanding (Đúng hay Sai?)', question: "Alice caught a fish after waiting for a few minutes.", options: [{ id: 'True', text: "True" }, { id: 'False', text: "False" }], correctAnswer: 'True', explanation: "Đúng, sau vài phút chờ đợi cô đã câu được một con cá." },
                    { id: '14b_tf2', question: "The fish looked happy.", options: [{ id: 'True', text: "True" }, { id: 'False', text: "False" }], correctAnswer: 'False', explanation: "Sai, con cá trông có vẻ buồn (looked sad)." },
                    { id: '14b_tf3', question: "Alice put the fish back into the water.", options: [{ id: 'True', text: "True" }, { id: 'False', text: "False" }], correctAnswer: 'True', explanation: "Đúng, cô đã thả con cá lại xuống nước (put it back in the water)." },
                    { id: '14b_tf4', question: "Alice wanted to keep the fish.", options: [{ id: 'True', text: "True" }, { id: 'False', text: "False" }], correctAnswer: 'False', explanation: "Sai, cô ấy đã thả nó đi và nói không muốn bắt bất cứ thứ gì nữa." },
                    { id: '14b_tf5', question: "Alice thought sitting was better than fishing.", options: [{ id: 'True', text: "True" }, { id: 'False', text: "False" }], correctAnswer: 'True', explanation: "Đúng, cô nói 'Sitting is better than fishing'." },

                    // II. Multiple Choice
                    { id: '14b_mc1', section: 'II. Circle the Correct Answer (Chọn đáp án đúng)', question: "What did Alice get at the beginning of the story?", options: [{ id: 'A', text: "A fishing pole and a hook" }, { id: 'B', text: "A fishing net" }], correctAnswer: 'A', explanation: "Ban đầu Alice có một chiếc cần câu và lưỡi câu." },
                    { id: '14b_mc2', question: "What happened after Alice put the hook in the water?", options: [{ id: 'A', text: "She went home." }, { id: 'B', text: "She waited." }], correctAnswer: 'B', explanation: "Sau khi thả lưỡi câu, cô ấy đã chờ đợi (She waited)." },
                    { id: '14b_mc3', question: "Why did Alice put the fish back in the water?", options: [{ id: 'A', text: "The fish looked sad." }, { id: 'B', text: "The fish was too small." }], correctAnswer: 'A', explanation: "Bởi vì con cá trông có vẻ buồn (The fish looked sad)." },
                    { id: '14b_mc4', question: "What did Alice do after putting the fish back?", options: [{ id: 'A', text: "She put her pole away and sat down." }, { id: 'B', text: "She caught another fish." }], correctAnswer: 'A', explanation: "Cô ấy cất cần câu đi và ngồi xuống." },
                    { id: '14b_mc5', question: "What lesson did Alice learn?", options: [{ id: 'A', text: "Sitting is better than fishing." }, { id: 'B', text: "Fishing is always fun." }], correctAnswer: 'A', explanation: "Cô ấy nhận ra ngồi không tốt hơn là đi câu cá." },

                    // III. Story Summary
                    { id: '14b_sum1', section: 'III. Story Summary (Điền từ tóm tắt câu chuyện)', useWordBank: true, type: 'input', question: "Alice got a (1) <b>___</b>", correctAnswer: "hook", explanation: "Từ cần điền là 'hook'." },
                    { id: '14b_sum2', type: 'input', question: "and a (2) <b>___</b>.", correctAnswer: "pole", explanation: "Từ cần điền là 'pole'." },
                    { id: '14b_sum3', type: 'input', question: "She put the hook in the water and (3) <b>___</b>.", correctAnswer: "waited", explanation: "Từ cần điền là 'waited'." },
                    { id: '14b_sum4', type: 'input', question: "Soon she caught a (4) <b>___</b>.", correctAnswer: "fish", explanation: "Từ cần điền là 'fish'." },
                    { id: '14b_sum5', type: 'input', question: "The fish looked (5) <b>___</b>,", correctAnswer: "sad", explanation: "Từ cần điền là 'sad'." },
                    { id: '14b_sum6', type: 'input', question: "so she put it (6) <b>___</b> into the water.", correctAnswer: "back", explanation: "Từ cần điền là 'back'." },
                    { id: '14b_sum7', type: 'input', question: "Then she put her pole (7) <b>___</b>.", correctAnswer: "away", explanation: "Từ cần điền là 'away'." },
                    { id: '14b_sum8', type: 'input', question: "She thought (8) <b>___</b> was better than fishing.", correctAnswer: "sitting", explanation: "Từ cần điền là 'sitting'." },

                    // IV. Find the Mistake
                    { id: '14b_err1', section: 'IV. Find the mistake and correct it (Tìm lỗi sai và sửa lại)', type: 'input', question: "Alice <u>catch</u> a fish after a few minutes. ➔ <b>___</b>", correctAnswer: "caught", explanation: "Sự việc đã xảy ra nên 'catch' phải chuyển thành 'caught'." },
                    { id: '14b_err2', type: 'input', question: "The fish <u>look</u> sad. ➔ <b>___</b>", correctAnswer: "looked", explanation: "Sự việc đã xảy ra nên 'look' phải chuyển thành 'looked'." },
                    { id: '14b_err3', type: 'input', question: "Alice put the fish <u>on</u> the water. ➔ <b>___</b>", correctAnswer: "back in", explanation: "Giới từ đúng là 'back in' (thả lại xuống nước)." },
                    { id: '14b_err4', type: 'input', question: "She <u>don't</u> want to catch anything. ➔ <b>___</b>", correctAnswer: "doesn't", explanation: "Chủ ngữ 'She' là số ít nên mượn trợ động từ 'doesn't'." }
                ]
            }
        ];

        let currentLessonId = '14A'; 
        let currentScore = 0;
        let userAnswers = {}; 
        let currentWordBank = [];

        function initApp() {
            renderLessonTabs();
            loadLesson(currentLessonId);
        }

        function renderLessonTabs() {
            const tabsContainer = document.getElementById('lesson-tabs');
            tabsContainer.innerHTML = '';
            lessonsData.forEach(lesson => {
                const btn = document.createElement('button');
                btn.className = `lesson-tab flex-shrink-0 px-5 py-3 rounded-xl font-bold text-sm sm:text-base transition-colors border-2`;
                btn.innerText = `Bài ${lesson.id}`;
                btn.onclick = () => loadLesson(lesson.id);
                
                if (lesson.id === currentLessonId) {
                    btn.classList.add('bg-bamboo-500', 'text-white', 'border-bamboo-600', 'shadow-md');
                } else {
                    btn.classList.add('bg-white', 'text-slate-500', 'border-slate-200', 'hover:bg-bamboo-50', 'hover:text-bamboo-600');
                }
                tabsContainer.appendChild(btn);
            });
        }

        function loadLesson(lessonId) {
            currentLessonId = lessonId;
            const lesson = lessonsData.find(l => l.id === lessonId);
            
            currentScore = 0;
            userAnswers = {};
            currentWordBank = lesson.wordBank || [];
            renderLessonTabs();

            document.getElementById('passage-title').innerText = lesson.title;
            document.getElementById('passage-content').innerHTML = lesson.passage;
            document.getElementById('passage-image-placeholder').innerText = lesson.emoji || "🖼️";
            document.getElementById('passage-image-desc').innerText = lesson.imageDesc || "Hình minh hoạ";

            const qContainer = document.getElementById('questions-container');
            qContainer.innerHTML = ''; 
            
            document.getElementById('total-questions-display').innerText = lesson.questions.length;
            document.getElementById('answered-display').innerText = '0';

            let currentSection = '';
            let currentSectionContainer = qContainer;

            lesson.questions.forEach((q, index) => {
                if (q.section && q.section !== currentSection) {
                    currentSection = q.section;
                    
                    currentSectionContainer = document.createElement('div');
                    currentSectionContainer.className = 'space-y-6 pb-4'; 
                    qContainer.appendChild(currentSectionContainer);

                    const sectionHeader = document.createElement('div');
                    sectionHeader.className = 'col-span-full bg-sunny-100 text-sunny-700 font-extrabold p-4 rounded-2xl mt-6 mb-2 border-l-8 border-sunny-500 text-xl tracking-wide shadow-sm';
                    sectionHeader.innerHTML = q.section;
                    currentSectionContainer.appendChild(sectionHeader);
                    
                    if (q.useWordBank && currentWordBank.length > 0) {
                        const wbHtml = `
                            <div id="sticky-word-bank-${index}" class="sticky top-4 z-50 bg-white/95 backdrop-blur-sm border-4 border-magic-400 p-5 rounded-2xl shadow-xl mb-4 mt-2 transition-all">
                                <div class="flex items-center justify-between mb-3">
                                    <h3 class="font-extrabold text-magic-600 text-lg flex items-center gap-2"><span>🏷️</span> Word Bank</h3>
                                    <span class="text-xs font-bold bg-magic-100 text-magic-600 px-2 py-1 rounded-md">Bấm vào từ để điền nhanh!</span>
                                </div>
                                <div class="word-bank-words flex flex-wrap gap-2"></div>
                            </div>
                        `;
                        currentSectionContainer.insertAdjacentHTML('beforeend', wbHtml);
                    }
                }
                
                currentSectionContainer.appendChild(createQuestionCard(q, index));
            });

            const submitBtnHtml = `
                <div id="submit-container" class="mt-8 pt-8 border-t-4 border-dashed border-slate-200 text-center">
                    <button id="main-submit-btn" onclick="submitLesson()" class="bg-slate-300 text-slate-500 font-extrabold py-4 px-12 rounded-full text-2xl shadow-md transition-all duration-300 inline-flex items-center gap-3">
                        <span>Nộp bài ngay</span> 🚀
                    </button>
                    <p id="submit-warning" class="text-red-500 font-bold mt-3 hidden"></p>
                </div>
            `;
            qContainer.insertAdjacentHTML('beforeend', submitBtnHtml);

            if (currentWordBank.length > 0) updateWordBankUI();
        }

        function createQuestionCard(q, index) {
            const questionCard = document.createElement('div');
            questionCard.className = 'question-card bg-slate-50 rounded-2xl p-5 border-2 border-slate-200';
            questionCard.id = `q-card-${q.id}`;

            const qHeader = document.createElement('div');
            qHeader.className = 'flex gap-3 mb-4';
            qHeader.innerHTML = `
                <div class="bg-sunny-100 text-sunny-500 font-bold w-10 h-10 flex items-center justify-center rounded-full shrink-0 text-xl border-2 border-sunny-400 shadow-sm mt-1">${index + 1}</div>
                <div class="w-full"><h3 class="text-xl font-bold text-slate-700 pt-1 leading-snug w-full">${q.question}</h3></div>
            `;
            questionCard.appendChild(qHeader);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'space-y-3 pl-0 sm:pl-13 w-full';
            
            if (q.type === 'input') {
                const wbClass = q.id.includes('f') || q.id.includes('sum') ? 'word-bank-input' : '';
                optionsDiv.innerHTML = `
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="input-${q.id}" class="flex-1 p-4 border-2 border-slate-300 rounded-xl font-bold text-lg text-slate-700 focus:border-sunny-400 focus:outline-none ${wbClass}" placeholder="Nhập câu trả lời..." oninput="resetInputState('${q.id}')" onkeypress="if(event.key === 'Enter') handleAnswer('${q.id}')">
                        <button id="btn-${q.id}-submit" onclick="handleAnswer('${q.id}')" class="bg-slate-300 hover:bg-slate-400 text-slate-700 font-bold py-4 px-8 rounded-xl transition-colors shadow-sm text-lg shrink-0">Lưu đáp án</button>
                    </div>
                `;
            } else {
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = `option-btn w-full text-left p-4 rounded-xl border-2 border-slate-300 bg-white font-bold text-lg text-slate-600 flex items-center gap-3`;
                    btn.id = `btn-${q.id}-${opt.id}`;
                    
                    const circleIconText = opt.id === 'True' ? 'T' : (opt.id === 'False' ? 'F' : (opt.id === 'A' || opt.id === 'B' || opt.id === 'C' ? opt.id : opt.id));
                    
                    btn.innerHTML = `<span class="inline-block w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center border-2 border-slate-200 shrink-0 uppercase indicator-circle">${circleIconText}</span> <span>${opt.text}</span>`;
                    btn.onclick = () => handleAnswer(q.id, opt.id);
                    optionsDiv.appendChild(btn);
                });
            }
            questionCard.appendChild(optionsDiv);

            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feedback-${q.id}`;
            feedbackDiv.className = 'mt-5 hidden rounded-2xl p-5 text-lg font-medium shadow-inner';
            questionCard.appendChild(feedbackDiv);

            return questionCard;
        }

        function updateWordBankUI() {
            if (!currentWordBank || currentWordBank.length === 0) return;
            const wbContainers = document.querySelectorAll('.word-bank-words');
            if (wbContainers.length === 0) return;
            
            const inputs = document.querySelectorAll('.word-bank-input');
            const usedWords = Array.from(inputs).map(i => i.value.trim().toLowerCase());
            
            wbContainers.forEach(container => {
                container.innerHTML = currentWordBank.map(w => {
                    const isUsed = usedWords.includes(w.toLowerCase());
                    if (isUsed) {
                        return `<span class="bg-slate-100 text-slate-400 px-4 py-2 rounded-xl font-bold border-2 border-slate-200 line-through opacity-60 select-none">${w}</span>`;
                    } else {
                        return `<span onclick="fillNextEmptyWord('${w}')" class="bg-magic-100 text-magic-700 px-4 py-2 rounded-xl font-bold border-2 border-magic-300 shadow-sm cursor-pointer hover:bg-magic-200">${w}</span>`;
                    }
                }).join('');
            });
        }

        function fillNextEmptyWord(word) {
            const inputs = document.querySelectorAll('.word-bank-input');
            for (let input of inputs) {
                if (!input.value.trim() && !input.disabled) {
                    input.value = word;
                    const qId = input.id.replace('input-', '');
                    resetInputState(qId);
                    input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    handleAnswer(qId);
                    break;
                }
            }
        }

        function resetInputState(qId) {
            const btn = document.getElementById(`btn-${qId}-submit`);
            if(btn) {
                btn.innerText = 'Lưu đáp án';
                btn.className = 'bg-slate-300 hover:bg-slate-400 text-slate-700 font-bold py-4 px-8 rounded-xl transition-colors shadow-sm text-lg shrink-0';
            }
            updateWordBankUI();
        }

        function handleAnswer(questionId, selectedOptionId) {
            const lesson = lessonsData.find(l => l.id === currentLessonId);
            const q = lesson.questions.find(q => q.id === questionId);
            
            let isCorrect = false, userVal = "", correctDisplay = "";

            if (q.type === 'input') {
                userVal = document.getElementById(`input-${questionId}`).value;
                if (!userVal.trim()) return; 
                isCorrect = userVal.toLowerCase().replace(/[^a-z0-9]/g, '') === q.correctAnswer.toLowerCase().replace(/[^a-z0-9]/g, '');
                correctDisplay = q.correctAnswer;
                
                const btnSubmit = document.getElementById(`btn-${questionId}-submit`);
                btnSubmit.className = 'bg-sunny-400 text-white font-bold py-4 px-8 rounded-xl transition-colors shadow-sm text-lg shrink-0';
                btnSubmit.innerText = 'Đã lưu ✓';
                updateWordBankUI();
            } else {
                isCorrect = selectedOptionId === q.correctAnswer;
                correctDisplay = q.options.find(o => o.id === q.correctAnswer).text;
                userVal = selectedOptionId;
                
                q.options.forEach(opt => {
                    const btn = document.getElementById(`btn-${questionId}-${opt.id}`);
                    const circleIconText = opt.id === 'True' ? 'T' : (opt.id === 'False' ? 'F' : (opt.id === 'A' || opt.id === 'B' || opt.id === 'C' ? opt.id : opt.id));

                    if (opt.id === selectedOptionId) {
                        btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 bg-sunny-50 border-sunny-400 text-sunny-700 font-bold text-lg flex items-center gap-3';
                        const span = btn.querySelector('.indicator-circle');
                        span.className = 'inline-block w-8 h-8 rounded-full bg-sunny-400 text-white flex items-center justify-center border-2 border-sunny-400 shrink-0 uppercase indicator-circle';
                        span.innerText = circleIconText;
                    } else {
                        btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-slate-300 bg-white opacity-50 font-bold text-lg text-slate-600 flex items-center gap-3';
                        const span = btn.querySelector('.indicator-circle');
                        span.className = 'inline-block w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center border-2 border-slate-200 shrink-0 uppercase indicator-circle';
                        span.innerText = circleIconText;
                    }
                });
            }

            userAnswers[questionId] = { value: userVal, isCorrect: isCorrect, correctDisplay: correctDisplay };
            document.getElementById('answered-display').innerText = Object.keys(userAnswers).length;
            
            if (Object.keys(userAnswers).length === lesson.questions.length) {
                const mainBtn = document.getElementById('main-submit-btn');
                mainBtn.className = 'bg-gradient-to-r from-sunny-400 to-sunny-500 hover:from-sunny-500 hover:to-sunny-600 text-white font-extrabold py-4 px-12 rounded-full text-2xl shadow-xl transform hover:scale-105 transition-all inline-flex items-center gap-3';
                document.getElementById('submit-warning').classList.add('hidden');
            }
        }

        async function submitLesson() {
            const lesson = lessonsData.find(l => l.id === currentLessonId);
            const studentName = document.getElementById('student-name').value.trim();
            const warning = document.getElementById('submit-warning');
            
            if (!studentName) {
                warning.innerText = `Em hãy nhập tên của mình ở đầu trang trước khi nộp bài nhé!`;
                warning.classList.remove('hidden');
                document.getElementById('student-name').focus();
                return;
            }

            if (Object.keys(userAnswers).length < lesson.questions.length) {
                warning.innerText = `Em mới làm ${Object.keys(userAnswers).length}/${lesson.questions.length} câu. Hãy hoàn thành hết rồi nộp nhé!`;
                warning.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('main-submit-btn');
            btn.innerHTML = `<div class="spinner border-t-white w-6 h-6 mr-2"></div> Đang gửi kết quả...`;
            btn.disabled = true;
            warning.classList.add('hidden');

            currentScore = 0;
            let mistakesList = [];
            
            lesson.questions.forEach((q, idx) => {
                const ans = userAnswers[q.id];
                const feedbackDiv = document.getElementById(`feedback-${q.id}`);
                const qCard = document.getElementById(`q-card-${q.id}`);

                if (q.type === 'input') {
                    document.getElementById(`input-${q.id}`).disabled = true;
                    document.getElementById(`btn-${q.id}-submit`).disabled = true;
                } else {
                    q.options.forEach(opt => document.getElementById(`btn-${q.id}-${opt.id}`).disabled = true);
                }

                if (ans.isCorrect) {
                    currentScore++;
                    qCard.classList.add('border-bamboo-300', 'bg-bamboo-50/20');
                    feedbackDiv.className = 'mt-5 rounded-2xl p-5 text-lg bg-assistant-100 border-2 border-assistant-500 block';
                    feedbackDiv.innerHTML = `<div class="font-bold text-assistant-700 text-xl">Chính xác! ${q.explanation}</div>`;
                } else {
                    mistakesList.push(`Câu ${idx + 1} (Điền: ${ans.value} -> Đúng: ${ans.correctDisplay})`);
                    qCard.classList.add('border-red-200', 'bg-red-50/20');
                    feedbackDiv.className = 'mt-5 rounded-2xl p-5 text-lg bg-red-50 border-2 border-red-300 block';
                    feedbackDiv.innerHTML = `
                        <div class="font-bold text-red-600 text-xl mb-1">Chưa đúng rồi!</div>
                        <div class="bg-white rounded-lg p-3 border border-red-100 shadow-sm mb-2"><span class="font-bold text-slate-800">👉 Đáp án đúng là: <span class="text-bamboo-600">${ans.correctDisplay}</span></span></div>
                        <span class="font-normal text-slate-700"><b>💡 Vì sao nhỉ?</b> ${q.explanation}</span>
                    `;
                }
            });

            const scriptURL = 'https://script.google.com/macros/s/AKfycbzX5jUEzt05bvIoSkKqn_XRBFG9MyRBFgwEoUgdZixbPlmgLcFH0NOp9Wi6NeoVfZ-E/exec';
            const ratio = currentScore / lesson.questions.length;
            let comments = ratio === 1 ? "Xuất sắc! Điểm tối đa." : (ratio >= 0.7 ? "Rất giỏi!" : "Cố gắng lên nhé!");
            
            const payload = {
                userName: studentName,
                score: `${currentScore}/${lesson.questions.length}`,
                modul: lesson.title,
                mistakes: mistakesList.length > 0 ? mistakesList.join(' | ') : "Không có lỗi sai nào",
                knowledge: "Reading Comprehension & Vocabulary",
                comments: comments
            };

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    redirect: 'follow', 
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8' 
                    },
                    body: JSON.stringify(payload)
                });
                console.log("Đã yêu cầu lưu kết quả lên Sheets!");
            } catch (error) {
                console.error("Có thể bị lỗi CORS trên trình duyệt, nhưng dữ liệu vẫn lên Sheet:", error);
            }

            document.getElementById('submit-container').classList.add('hidden');
            showResult(lesson.questions.length);
        }

        function showResult(totalQs) {
            const modal = document.getElementById('result-modal');
            document.getElementById('modal-correct-score').innerText = currentScore;
            document.getElementById('modal-incorrect-score').innerText = totalQs - currentScore;
            
            const ratio = currentScore / totalQs;
            if (ratio === 1) {
                document.getElementById('modal-title').innerText = "Xuất sắc!";
                document.getElementById('modal-title').className = "text-3xl font-extrabold text-bamboo-600 mb-2";
                fireConfetti();
            } else if (ratio >= 0.6) {
                document.getElementById('modal-title').innerText = "Giỏi lắm!";
                document.getElementById('modal-title').className = "text-3xl font-extrabold text-sunny-500 mb-2";
                fireConfetti();
            } else {
                document.getElementById('modal-title').innerText = "Cố lên nhé!";
                document.getElementById('modal-title').className = "text-3xl font-extrabold text-blue-500 mb-2";
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-content').classList.remove('scale-95');
                document.getElementById('modal-content').classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            document.getElementById('result-modal').classList.add('hidden');
            document.getElementById('modal-content').classList.remove('scale-100');
            document.getElementById('modal-content').classList.add('scale-95');
            document.getElementById('questions-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function fireConfetti() {
            var duration = 3 * 1000, animationEnd = Date.now() + duration, defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        window.onload = initApp;
    </script>
</body>
</html>
